                const totalAmount = document.getElementById('total').textContent;
                if (parseFloat(totalAmount) <= 0) { alert('Añade productos para pagar'); return actions.reject(); }
                return actions.order.create({ purchase_units: [{ amount: { currency_code: 'EUR', value: totalAmount }, description: "Compra Digital Nicaragua" }] });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    enviarWhatsAppAutomatico(details);
                    alert('¡Pago exitoso! El administrador ha sido notificado.');
                    carrito = []; actualizarCarrito(); toggleCarrito();
                });
            }
        }).render('#paypal-button-container');

        renderizarProductos();
    </script>
</body>

</html>
